format = "brainlesslab-plan"
format_version = 1
operation = "profile"
id = "my_project_profile"

[[targets]]
id = "my_task"

[targets.composition]
id = "my_project"
node = "my_node"
task = "my_task"
n_nodes = 80

[targets.evaluation]
blocks = 2
trials_per_block = 2
horizon = 300
warmup = 50
construction_scope = "trial"
reset = "full"
root_seed = 3001
aggregate = "mean"

[profile]
target = "my_task"
analyses = []
record_every = 1
