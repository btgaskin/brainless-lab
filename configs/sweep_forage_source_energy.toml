# falandays: sweep size (N), swarm setup (n_agents), and SOURCE ENERGY
# (source_gain — how hard the source drives activity through the reservoir).
# Dense arena (15) so agents reliably reach the source and the activity readout
# (rate_mean, susceptibility, spectral radius) is clean. One-at-a-time: each axis
# varied from the baseline independently.
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_source_energy.toml

[sweep]
id = "forage_source_energy"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays"
task = "forage"
N = 100
n_agents = 6
ticks = 1200
window = 1200
"env.space_size" = 15.0
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"task.N" = [100, 200, 400]
"env.n_agents" = [6, 20, 40]
"env.source_gain" = [0.25, 0.5, 1.0, 2.0, 4.0]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "highgain"
timeseries = true
gif = false
window = 240
stride = 60
n_shifts = 20
seed = 4242

[capture.groups.highgain]
"env.source_gain" = 2.0

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
