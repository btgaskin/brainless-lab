# Informed-minority (Vanni-Grigolini) regime: larger arena, tighter sensing
# range, more agents -> only ~5% of agents can see the source at any instant, so
# the blind majority must follow via conspecific coupling. N=100 (network
# optimum). Collective (vision on) vs individual (vision off): in this regime the
# individual case should fail (can't find the source alone), so any collective
# advantage carries genuine transmitted information -- the setting where ensemble
# criticality could survive the null.
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_flock.toml

[sweep]
id = "forage_flock"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays_base"
task = "forage"
N = 100
n_agents = 40
ticks = 1500
window = 1500
"env.space_size" = 30.0
"env.vision_range" = 4.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"env.conspecific_vision" = [true, false]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "collective"
timeseries = true
gif = false
window = 300
stride = 75
n_shifts = 30
seed = 4242

[capture.groups.collective]
"env.conspecific_vision" = true

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
