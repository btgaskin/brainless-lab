# Hemispheric Falandays with the SAME power-law kernel/effector-wiring
# choice as configs/sweep_spatial_powerlaw.toml (kernel=power_law,
# effector_wiring=spatial, alpha/d0/p0 held at that sweep's baseline), so the
# spatial-vs-hemispheric comparison isn't confounded by also changing the
# decay law. Sweeps the hemispheric-specific integration knobs:
# callosum_density (cross-hemisphere homotopic link probability, 0 = isolated
# hemispheres) and contralateral (contralateral vs ipsilateral body/region
# wiring).
#
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_hemispheric_callosum.toml

[sweep]
id = "hemispheric_callosum"
mode = "factorial"
seeds = [0, 1, 2, 3]
max_cells = 40
max_rollouts = 160

[baseline]
node = "falandays_hemispheric"
task = "wall"
N = 100
ticks = 1000
window = 200
"node.kernel" = "power_law"
"node.effector_wiring" = "spatial"
"node.alpha" = 2.0
"node.d0" = 0.3
"node.p0" = 0.5
"node.link_p" = 0.1
"node.extent" = 1.0

[axes]
"node.callosum_density" = [0.0, 0.1, 0.25, 0.5, 0.75, 1.0]
"node.contralateral" = [true, false]

[analytics]
measures = ["sigma_mr", "spectral_radius", "liveness"]
viable_threshold = 0.5
