# Cross-scale equivalence sweep (falandays, link_p at default).
# Associated dimensions: task.N (network population) <-> env.n_agents (ensemble
# population); env.conspecific_vision is the collective-coupling / blind control.
# Goal: does network criticality respond to N the way ensemble criticality
# responds to n_agents -- a shared coupling dimension across scales?
# (Signalling deferred: env.signalling is not yet a sweepable axis.)
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_equivalence.toml

[sweep]
id = "forage_equivalence"
mode = "factorial"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 160

[baseline]
node = "falandays"
task = "forage"
N = 100
n_agents = 6
ticks = 1200
window = 1200
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"task.N" = [100, 250, 500]
"env.n_agents" = [4, 8, 16]
"env.conspecific_vision" = [true, false]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "corner"
timeseries = true
gif = true
gif_framerate = 20
gif_maxframes = 160
window = 240
stride = 60
n_shifts = 20
seed = 4242

[capture.groups.corner]
"task.N" = 500
"env.n_agents" = 16

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
