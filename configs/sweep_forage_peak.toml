# Fine sweep around the N=100 foraging peak, capturing a GIF at every cell so we
# can watch how clearly the swarm forages across sizes (frozen HEAD 30b1af2).
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_peak.toml

[sweep]
id = "forage_peak"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays"
task = "forage"
N = 100
n_agents = 6
ticks = 1200
window = 1200
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"task.N" = [60, 80, 100, 120, 150, 200]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "all"
timeseries = true
gif = true
gif_framerate = 15
gif_maxframes = 200
window = 240
stride = 60
n_shifts = 5
seed = 4242

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
