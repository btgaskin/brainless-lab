# Extended-node architecture sweep: parity with the base criticality sweep
# (link_p / N / conspecific vision) so base vs extended is comparable on the
# same architecture axes.
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_extended_arch.toml

[sweep]
id = "forage_extended_arch"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays_extended"
task = "forage"
N = 80
n_agents = 6
ticks = 1200
window = 1200
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"node.link_p" = [0.05, 0.1, 0.2]
"task.N" = [60, 100]
"env.conspecific_vision" = [true, false]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "representative"
timeseries = true
gif = true
gif_framerate = 20
gif_maxframes = 160
window = 240
stride = 60
n_shifts = 20
seed = 4242

[capture.groups.representative]
"node.link_p" = 0.1

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
