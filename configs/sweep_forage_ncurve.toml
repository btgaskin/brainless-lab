# Confirmation sweep on the frozen HEAD (30b1af2): foraging vs network size
# across BOTH prior ranges in one run / one scoring calibration, to test the
# inverted-U (peak ~N=100) suggested by the two incomparable earlier sweeps.
# falandays, n_agents=6, vision on, source_gain=1 (all held).
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_ncurve.toml

[sweep]
id = "forage_ncurve"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays"
task = "forage"
N = 100
n_agents = 6
ticks = 1200
window = 1200
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
"task.N" = [40, 60, 80, 100, 200, 400, 700, 1000]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "peak"
timeseries = true
gif = true
gif_framerate = 20
gif_maxframes = 160
window = 240
stride = 60
n_shifts = 20
seed = 4242

[capture.groups.peak]
"task.N" = 100

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
