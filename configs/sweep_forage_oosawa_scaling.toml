# falandays_base + Oosawa drive: tune the drive scaling (drive.noise_gain — the
# target-deficit-modulated exploration noise). Internal energy injection, vs the
# source_gain (external) sweep. Same baseline as forage_source_energy for
# comparability; the no-drive baseline cell is the reference. Watch whether the
# drive UN-PINS branching (m_node) / moves activity where source energy and N did.
# Run with:
#   julia --project=. sweep/run.jl configs/sweep_forage_oosawa_scaling.toml

[sweep]
id = "forage_oosawa_scaling"
mode = "one_at_a_time"
seeds = [0, 1, 2, 3]
max_cells = 200
max_rollouts = 80

[baseline]
node = "falandays_base"
task = "forage"
N = 100
n_agents = 6
ticks = 1200
window = 1200
"env.space_size" = 15.0
"env.vision_range" = 6.0
"env.source_gain" = 1.0
"env.capture_radius" = 1.0
"env.sensory_noise" = 0.05

[axes]
# Any nonzero drive.* flips falandays_base onto the Oosawa drive.
"drive.noise_gain" = [0.1, 0.25, 0.5, 1.0, 2.0]

[analytics]
measures = [
  "sigma_mr", "sigma_mr_node", "sigma_mr_agent", "dist_to_source",
  "susceptibility_node", "susceptibility_agent", "correlation_length",
  "contact_clusters", "spectral_radius", "liveness", "regime",
]

[capture]
group = "middrive"
timeseries = true
gif = false
window = 240
stride = 60
n_shifts = 20
seed = 4242

[capture.groups.middrive]
"drive.noise_gain" = 1.0

[[ensemble]]
kind = "turn"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "align"
threshold = { quantile = 0.85 }
neighbor_radius = "vision_range"

[[ensemble]]
kind = "speed"
threshold = { quantile = 0.85 }

[[ensemble]]
kind = "graded"
