format = "brainlesslab-plan"
format_version = 1
operation = "evolve"
id = "evolve_tracking_test_pong_example"

[[targets]]
id = "tracking_development"

[targets.composition]
id = "falandays_tracking_evolution"
preset = "falandays_tracking"

[targets.evaluation]
blocks = 1
trials_per_block = 2
horizon = 240
warmup = 40
construction_scope = "trial"
reset = "full"
