format = "brainlesslab-plan"
format_version = 1
operation = "sweep"
id = "sweep_tracking_example"

[[targets]]
id = "tracking"

[targets.composition]
id = "falandays_tracking_sweep"
preset = "falandays_tracking"

[targets.evaluation]
blocks = 1
trials_per_block = 2
horizon = 120
warmup = 20
construction_scope = "trial"
reset = "full"
root_seed = 1201
aggregate = "mean"

[sweep]
target = "tracking"
mode = "factorial"
max_rollouts = 8

[[sweep.axes]]
parameter = "leak"
values = [0.25, 0.5]

[[sweep.axes]]
parameter = "lrate_wmat"
values = [0.35, 1.0]
