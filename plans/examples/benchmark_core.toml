[targets.evaluation]
blocks = 2
trials_per_block = 1
horizon = 400
warmup = 40
construction_scope = "trial"
reset = "full"
root_seed = 2501
aggregate = "mean"

[[targets]]
id = "pong_random"
[targets.composition]
id = "pong_random"
node = "null_random"
