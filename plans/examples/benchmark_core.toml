format = "brainlesslab-plan"
format_version = 1
operation = "benchmark"
id = "core_benchmark_example"

[[targets]]
id = "tracking_falandays"
[targets.composition]
id = "tracking_falandays"
preset = "falandays_tracking"
[targets.evaluation]
blocks = 2
trials_per_block = 1
