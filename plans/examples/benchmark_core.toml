n_nodes = 200
[targets.evaluation]
blocks = 2
trials_per_block = 1
horizon = 120
warmup = 20
construction_scope = "trial"
reset = "full"
root_seed = 1501
aggregate = "mean"

[[targets]]
id = "pong_falandays"
[targets.composition]
id = "pong_falandays"
